
{% extends "layout.html" %}
{% load static %}
{% block title %}Home Page{% endblock title %}
{% block content %}
<div class="min-h-screen w-full flex flex-col lg:flex-row bg-gray-100">

    <!-- Map section -->
    <div class="w-full lg:w-[70%] h-[80vh] lg:h-screen p-3 lg:p-4">
        <div class="bg-white rounded-2xl shadow-md h-full overflow-hidden border border-gray-200">
            <div class="px-4 py-3 lg:px-5 lg:py-4 border-b border-gray-200 flex items-center justify-between gap-3">
                <div>
                    <h1 class="text-xl lg:text-2xl font-bold text-gray-800">Live Bus Tracking</h1>
                    <p class="text-sm text-gray-500">See your institute buses in real time</p>
                </div>
                <button
                    id="current-location-btn"
                    type="button"
                    class="shrink-0 px-3 py-2 bg-slate-700 text-white rounded-lg text-sm hover:bg-slate-800 transition">
                    📍
                </button>
            </div>

           <div id="map" class="w-full h-[65vh] md:h-[calc(100%-80px)]"></div>

        </div>
    </div>

    <!-- Bus list section -->
    <div class="w-full lg:w-[30%] h-auto lg:h-screen p-3 lg:p-4 lg:pl-0">
        <div class="bg-white rounded-2xl shadow-md h-full border border-gray-200 flex flex-col">
            <div class="px-4 py-3 lg:px-5 lg:py-4 border-b border-gray-200">
                <h2 class="text-lg lg:text-xl font-semibold text-gray-800">Institute Buses</h2>
                <p class="text-sm text-gray-500">Click any bus to view its location</p>
            </div>

            <div class="p-3 lg:p-4 overflow-y-auto space-y-3" id="bus-list">
                <!-- Bus cards will be inserted here -->
            </div>
        </div>
    </div>

</div>

<!-- this is availble at leafjet.js ,,, cdn packages.-->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    //json style buses data. Each bus includes a small "routeCoords" polyline for display.
    const buses = [
        {
            id: 1,
            bus_no: "BUS-101",
            route: "Patia to Campus",
            lat: 20.3552,
            lng: 85.8195,
            routeCoords: [
                [20.3552, 85.8195],
                [20.3450, 85.8220],
                [20.3350, 85.8300],
                [20.3250, 85.8350],
                [20.3150, 85.8400]
            ]
        },
        {
            id: 2,
            bus_no: "BUS-102",
            route: "Cuttack to Campus",
            lat: 20.4625,
            lng: 85.8828,
            routeCoords: [
                [20.4625, 85.8828],
                [20.4500, 85.8700],
                [20.4400, 85.8600],
                [20.4300, 85.8500],
                [20.4200, 85.8400]
            ]
        },
        {
            id: 3,
            bus_no: "BUS-103",
            route: "Khandagiri to Campus",
            lat: 20.2961,
            lng: 85.8245,
            routeCoords: [
                [20.2961, 85.8245],
                [20.3000, 85.8200],
                [20.3100, 85.8150],
                [20.3200, 85.8120],
                [20.3300, 85.8100]
            ]
        }
    ];

   //Available in Leaflet.js website . overview section...
    const map = L.map('map').setView([20.2961, 85.8245], 11);

    //map layers
    const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    });

    const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    });

    const lightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    });

    const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors, SRTM | OpenTopoMap'
    });

    const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri'
    });

    const baseLayers = {
        "Street (OSM)": streetLayer,
        "Dark": darkLayer,
        "Light": lightLayer,
        "Topographic": topoLayer,
        "Satellite": satelliteLayer
    };
    // if there is dark theme on in system then it will show dark map by default.
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const defaultLayer = prefersDark ? darkLayer : streetLayer;
    defaultLayer.addTo(map);

    L.control.layers(baseLayers, {}, { collapsed: true }).addTo(map);

    const markers = {};

    //showing the bus popup when the marker is clicked.
    buses.forEach(bus => {
        const marker = L.marker([bus.lat, bus.lng])
            .addTo(map)
            .bindPopup(`
                <div style="min-width:180px">
                    <h3 style="font-weight:bold;">${bus.bus_no}</h3>
                    <p>Route: ${bus.route}</p>
                </div>
            `);

        markers[bus.id] = marker;
    });

    const busList = document.getElementById("bus-list");
    const currentLocationBtn = document.getElementById("current-location-btn");

    // Use a green marker icon for user location (Leaflet default is blue)
    const currentLocationIcon = L.icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
        iconRetinaUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    let currentLocationMarker = null;
    let currentRouteLine = null;

    //listing the cards in buslist...
    buses.forEach(bus => {
        const card = document.createElement("div");
        card.className = "p-4 rounded-xl border border-gray-200 hover:bg-blue-50 cursor-pointer transition";

        card.innerHTML = `
            <h3 class="text-base lg:text-lg font-semibold text-gray-800">${bus.bus_no}</h3>
            <p class="text-sm text-gray-600 mt-1"><span class="font-medium">Route:</span> ${bus.route}</p>
            <button class="mt-3 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">
                View Location
            </button>
        `;

        card.addEventListener("click", () => {
            // Hide all other bus markers
            Object.values(markers).forEach(m => {
                if (m !== markers[bus.id]) {
                    map.removeLayer(m);
                }
            });

            // Add the selected bus marker (if it was removed)
            if (!map.hasLayer(markers[bus.id])) {
                markers[bus.id].addTo(map);
            }

            // Draw the bus path (polyline) and remove the old one if exists
            if (currentRouteLine) {
                map.removeLayer(currentRouteLine);
            }
            if (bus.routeCoords && bus.routeCoords.length > 1) {
                currentRouteLine = L.polyline(bus.routeCoords, { color: 'blue', weight: 4, opacity: 0.7 }).addTo(map);
                map.fitBounds(currentRouteLine.getBounds(), { padding: [50, 50] });
            } else {
                map.setView([bus.lat, bus.lng], 14, { animate: true });
            }

            markers[bus.id].openPopup();
        });

        busList.appendChild(card);
    });

    // Recenter map to user's current location on button click.
    currentLocationBtn.addEventListener("click", () => {
        if (!navigator.geolocation) {
            alert("Geolocation is not supported by your browser.");
            return;
        }

        currentLocationBtn.disabled = true;
        currentLocationBtn.textContent = "Locating...";

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const { latitude, longitude } = position.coords;
                map.setView([latitude, longitude], 15, { animate: true });

                if (currentLocationMarker) {
                    currentLocationMarker.setLatLng([latitude, longitude]);
                } else {
                    currentLocationMarker = L.marker([latitude, longitude], { icon: currentLocationIcon })
                        .addTo(map)
                        .bindPopup("You are here");
                }
                currentLocationMarker.openPopup();

                currentLocationBtn.disabled = false;
                currentLocationBtn.textContent = "📍";
            },
            () => {
                alert("Unable to fetch your current location. Please allow location access.");
                currentLocationBtn.disabled = false;
                currentLocationBtn.textContent = "📍";
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    });

    // Important fix for Leaflet on responsive layouts
    window.addEventListener("load", () => {
        setTimeout(() => {
            map.invalidateSize();
        }, 200);
    });

    window.addEventListener("resize", () => {
        setTimeout(() => {
            map.invalidateSize();
        }, 200);
    });
</script>
{% endblock %}
