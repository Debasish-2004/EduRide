{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-100 via-white to-blue-100 flex items-center justify-center px-4">

    <div class="w-full max-w-md bg-white shadow-2xl rounded-2xl p-8 border border-slate-200">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">Student Sign In</h1>
            <p class="text-slate-500 mt-2">Login to access your bus tracking dashboard</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 px-4 py-3 rounded-lg bg-red-100 text-red-700 text-sm">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label for="username" class="block text-sm font-medium text-slate-700 mb-2">
                    Username
                </label>
                <input
                    type="text"
                    name="username"
                    id="username"
                    placeholder="Enter your username"
                    required
                    class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-2">
                    Password
                </label>
                <input
                    type="password"
                    name="password"
                    id="password"
                    placeholder="Enter your password"
                    required
                    class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>

            <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition duration-200"
            >
                Sign In
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-slate-600">
                Don’t have an account?
                <a href="{% url 'student_signup' %}" class="text-blue-600 hover:underline font-medium">
                    Sign up
                </a>
            </p>
        </div>
    </div>

</body>
</html>
