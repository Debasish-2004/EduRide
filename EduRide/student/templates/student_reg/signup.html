{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-100 via-white to-sky-100 flex items-center justify-center px-4">

    <div class="w-full max-w-md bg-white shadow-2xl rounded-2xl p-8 border border-slate-200">
        
        <h1 class="text-3xl font-bold text-center text-slate-800 mb-6">
            Student Sign Up
        </h1>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 px-4 py-3 rounded-lg bg-red-100 text-red-700 text-sm">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" required
                class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500">

            <input type="email" name="email" placeholder="Email" required
                class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500">

            <input type="password" name="password1" placeholder="Password" required
                class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500">

            <input type="password" name="password2" placeholder="Confirm Password" required
                class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500">

            <button type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700">
                Create Account
            </button>
        </form>

        <p class="text-sm text-center mt-4">
            Already have an account?
            <a href="{% url 'student_signin' %}" class="text-blue-600 hover:underline">
                Sign In
            </a>
        </p>

    </div>

</body>
</html>
