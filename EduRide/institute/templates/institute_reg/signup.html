{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institute Admin Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">

    <div class="w-full max-w-md bg-white shadow-lg rounded-2xl p-8">
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">
            Institute Admin Signup
        </h2>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 px-4 py-3 rounded-lg text-sm
                    {% if message.tags == 'error' %}
                        bg-red-100 text-red-700
                    {% elif message.tags == 'success' %}
                        bg-green-100 text-green-700
                    {% else %}
                        bg-gray-100 text-gray-700
                    {% endif %}
                ">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Enter username">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Enter email">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Enter password">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input type="password" name="confirm_password"
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Confirm password">
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                Sign Up
            </button>
        </form>

        <div class="mt-6 text-center">
            <span class="text-sm text-gray-600">Already have an account?</span>
            <a href="{% url 'signin' %}" class="text-sm text-blue-600 hover:underline">
                Sign in
            </a>
        </div>

        <div class="mt-3 text-center">
            <a href="/" class="text-sm text-gray-500 hover:underline">
                Back to Home
            </a>
        </div>
    </div>

</body>
</html>
